<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Los Sistemáticos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="perfil-body">

<div class="perfil-card">
    <h1>Contáctanos</h1>
    <p class="bio">¿Tienes alguna duda sobre nuestro proyecto? Déjanos un mensaje y el equipo de <strong>Los Sistemáticos</strong> te responderá pronto.</p>

    <form action="#" class="formulario-contacto">
        <div class="campo">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
        </div>

        <div class="campo">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
        </div>

        <div class="campo">
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
        </div>

        <div class="botones">
            <a href="index.html" class="btn">⬅ Volver</a>
            <button type="submit" class="btn" onclick="enviar()">Enviar Mensaje</button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
